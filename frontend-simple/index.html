<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PharmaGuard</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">

  <!-- ✅ FIX: Font Awesome added -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- LEFT CORNER -->
  <div class="corner-animation top-left-corner">
    <div class="corner-glow glow-left"></div>
    <div class="heartbeat-icon">
      <i class="fas fa-heartbeat"></i>
    </div>
    <div class="floating-pill pill-1">💊</div>
    <div class="floating-pill pill-2">💊</div>
    <div class="floating-pill pill-3">💊</div>
  </div>

  <!-- RIGHT CORNER -->
  <div class="corner-animation top-right-corner">
    <div class="corner-glow glow-right"></div>
    <div class="medical-cross">
      <i class="fas fa-plus-circle"></i>
    </div>
    <div class="floating-particle particle-1"></div>
    <div class="floating-particle particle-2"></div>
    <div class="floating-particle particle-3"></div>
    <div class="floating-particle particle-4"></div>
  </div>

<div class="container">

  <!-- HERO -->
  <div class="hero">
    <h1>
      <i class="fas fa-shield-virus"></i>
      PharmaGuard
    </h1>
    <div class="hero-badge">
      <i class="fas fa-robot"></i> AI-Powered Safety Check | Real-time Interaction Analysis
    </div>
  </div>

  <!-- ============================= -->
  <!-- 📄 UPLOAD -->
  <!-- ============================= -->
  <div class="card">
    <h3>📄 Upload Report</h3>

    <!-- ✅ File input -->
    <input type="file" id="reportFile">

    <!-- ✅ Show selected file -->
    <div id="file-name" style="margin-top:10px; color:#555;"></div>
  </div>

  <!-- ============================= -->
  <!-- 💊 MEDICINES -->
  <!-- ============================= -->
  <div class="card">
    <h3>💊 Medicines</h3>

    <input type="text" id="medInput" placeholder="Enter medicine">
    <button id="addMedBtn">Add</button>

    <!-- Medicine tags -->
    <div id="medTagsContainer" style="margin-top:10px;"></div>
  </div>

  <!-- ============================= -->
  <!-- 🧠 BUTTONS -->
  <!-- ============================= -->
  <div class="card">
    <button id="analyzeReportBtn">🧠 Analyze Report</button>
    <button id="analyzeMedBtn">💊 Check Medicines</button>
  </div>

  <!-- ============================= -->
  <!-- 📊 RESULT -->
  <!-- ============================= -->
  <div id="resultPanel" class="hidden" style="margin-top:20px;"></div>

</div>

<!-- ============================= -->
<!-- JS -->
<!-- ============================= -->
<script src="script.js"></script>

</body>
</html>
